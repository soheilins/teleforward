name: Forward Telegram to Rubika

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  forward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run forward script
        env:
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_CHAT_ID: ${{ secrets.RUBIKA_CHAT_ID }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
        run: python forward_telegram.py

      - name: Commit state file (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_post_id.txt
          git diff --cached --quiet || git commit -m "Update last_post_id"
          git push
