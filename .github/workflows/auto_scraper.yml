name: Auto Scraper & Sender (No Images, No PDF)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

# Add this block to grant write permissions
permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 arabic-reshaper python-bidi

      - name: Run text scraper and sender
        env:
          RUBIKA_TOKEN: ${{ secrets.RUBIKA_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          CHANNEL: IranintlTV
        run: python -u text_scraper_sender.py
