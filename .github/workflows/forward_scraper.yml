name: Forward Telegram posts (scraper, no API)

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes to avoid IP block
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          RUBIKA_BOT_TOKEN: ${{ secrets.RUBIKA_BOT_TOKEN }}
          RUBIKA_RECIPIENTS: ${{ secrets.RUBIKA_RECIPIENTS }}
        run: python scraper.py

      - name: Commit state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_msg_id.txt
          git commit -m "Update last_msg_id" || echo "No changes"
          git push
