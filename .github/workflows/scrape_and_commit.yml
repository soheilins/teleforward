name: Scrape Telegram Channel

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 Pillow arabic-reshaper python-bidi reportlab

      - name: Run scraper (PDF generation)
        env:
          CHANNEL: IranintlTV
        run: python scrape_all_messages.py

      - name: Commit and push output folder and PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ last_id.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update archive PDF"
          git push
